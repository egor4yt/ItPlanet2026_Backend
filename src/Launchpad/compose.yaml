services:
  launchpad.api:
    image: launchpad.api
    container_name: api
    ports:
      - "3333:8080"
    build:
      context: .
      dockerfile: Launchpad.Api/Dockerfile
      no_cache: false
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      api.database:
        condition: service_healthy
  
  api.database:
    image: postgres:15-alpine
    container_name: database
    restart: unless-stopped
    ports:
      - "1300:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=launchpad
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d launchpad" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s