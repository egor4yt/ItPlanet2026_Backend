services:
  launchpad.api:
    image: launchpad.api
    ports:
      - "3333:8080"
    build:
      context: .
      dockerfile: Launchpad.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
  
  postgres:
    image: postgres:15-alpine
    container_name: launchpad-postgres
    restart: unless-stopped
    ports:
      - "1300:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=launchpad
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d launchpad" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s