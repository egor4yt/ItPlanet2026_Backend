# docker compose -p launchpad-local-observability up -d
# docker compose -p launchpad-local-observability --profile load-test up -d 

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: launchpad-prometheus-local
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - launchpad-local-metrics-data:/prometheus
      - ./dev-monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: launchpad-grafana-local
    ports:
      - "3230:3000"
    volumes:
      - launchpad-local-metrics-data:/var/lib/grafana
      - ./dev-monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./dev-monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    
  k6:
    image: grafana/k6:latest
    container_name: launchpad-k6-local
    profiles: ["load-test"]
    volumes:
      - ./dev-monitoring/load-test/script.js:/script.js
    environment:
      - CANDIDATES_API_URL=http://localhost:3334
    command: run /script.js

volumes:
  launchpad-local-metrics-data:
    name: launchpad-local-metrics-data