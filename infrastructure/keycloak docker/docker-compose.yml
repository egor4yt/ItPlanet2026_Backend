# docker compose -p launchpad-local-keycloak up -d

services:
  keycloack:
    image: quay.io/keycloak/keycloak:26.5.6
    container_name: launchpad-keycloak-local
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    ports:
      - "1290:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_IMPORT=/opt/keycloak/data/import/frontend-realm-export.json
    volumes:
      - launchpad-keycloak-local_data:/opt/keycloak/data
      - ./keycloak/themes:/opt/keycloak/themes:ro
      - ./keycloak/data:/opt/keycloak/data/import:ro
      
volumes:
  launchpad-keycloak-local_data:
