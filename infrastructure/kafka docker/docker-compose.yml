# docker compose -p launchpad-local-kafka up -d

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.8
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qz'
    volumes:
      - launchpad-kafka-local-data:/var/lib/kafka/data
      - ./kafka/init-kafka.sh:/usr/bin/init-kafka.sh
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: [ "/bin/sh", "-c", "/usr/bin/init-kafka.sh & /etc/confluent/docker/run" ]

volumes:
  launchpad-kafka-local-data:
    name: launchpad-kafka-local-data