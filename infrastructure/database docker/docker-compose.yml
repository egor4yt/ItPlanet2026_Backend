# docker compose -p launchpad-local-postgis up -d

services:
  postgis:
    image: postgis/postgis:15-3.5-alpine
    container_name: launchpad-postgis-local
    restart: unless-stopped
    ports:
      - "1299:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s